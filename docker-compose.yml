version: '3.8'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: emergensee-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: emergensee
      MONGO_INITDB_ROOT_PASSWORD: emergensee_dev_pass
      MONGO_INITDB_DATABASE: emergensee_dev
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/emergensee_dev --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emergensee-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
